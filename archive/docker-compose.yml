version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: msk-monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-msk_monitor}
      POSTGRES_USER: ${DB_USER:-msk_monitor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-msk_monitor} -d ${DB_NAME:-msk_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - msk-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: msk-monitor-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel"
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: ${DB_NAME:-msk_monitor}
      PG_USER: ${DB_USER:-msk_monitor}
      PG_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards/grafana_dashboard.json:/var/lib/grafana/dashboards/msk_overview.json:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - msk-net

volumes:
  postgres_data:
  grafana_data:

networks:
  msk-net:
    driver: bridge